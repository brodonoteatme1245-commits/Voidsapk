name: Build VoidsAPK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.OS }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.OS }}-gradle-

      - name: Unpack voidsapk.zip
        run: |
          set -e
          if [ -f voidsapk.zip ]; then
            echo "Unzipping voidsapk.zip..."
            unzip -q voidsapk.zip -d .
            ls -la
          else
            echo "voidsapk.zip not found in repo root"
            ls -la
            exit 1
          fi

      - name: Install Android SDK commandline-tools
        run: |
          set -e
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$HOME"
          echo "Downloading Android command-line tools..."
          curl -fsSLO https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" || true
          fi
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Build APK (Debug)
        run: |
          set -e
          PROJECT_DIR=voidsapk-project
          if [ ! -d "$PROJECT_DIR" ]; then
            # if project folder name differs, try to detect
            FOUND=$(ls -d */ | grep -i voidsapk || true)
            if [ -n "$FOUND" ]; then
              PROJECT_DIR=${FOUND%/}
            fi
          fi
          echo "Project dir: $PROJECT_DIR"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project directory not found, aborting."
            ls -la
            exit 1
          fi

          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
            cd "$PROJECT_DIR"
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            echo "gradlew not found, installing system gradle as fallback..."
            sudo apt-get update -y
            sudo apt-get install -y gradle unzip
            cd "$PROJECT_DIR"
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidsapk-apks
          path: '**/build/outputs/apk/**/*.apk'
